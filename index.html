<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日中文學習</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; line-height: 1.6; }
        .word-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .word { font-size: 1.5em; color: #2c3e50; font-weight: bold; }
        .pinyin { color: #7f8c8d; font-size: 0.9em; }
        .meaning { margin-top: 5px; }
        .sentence { font-style: italic; color: #34495e; margin-top: 5px; }
        h1 { color: #e67e22; }
        .date { color: #95a5a6; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>📚 每日中文學習 (2026-04-13)</h1>
    <p class="date">更新時間: 2026-04-13 07:45 HKT</p>

    <div class="word-card">
        <div class="word">1. 砥礪</div>
        <div class="pinyin">dǐ lì</div>
        <div class="meaning">磨練、鍛鍊。</div>
        <div class="sentence">例句：我們要在艱苦的環境中砥礪意志。</div>
    </div>

    <div class="word-card">
        <div class="word">2. 宏偉</div>
        <div class="pinyin">hóng wěi</div>
        <div class="meaning">規模大，氣勢雄壯。</div>
        <div class="sentence">例句：這座宏偉的建築物吸引了無數遊客前來參觀。</div>
    </div>

    <div class="word-card">
        <div class="word">3. 謙遜</div>
        <div class="pinyin">qiān xùn</div>
        <div class="meaning">謙虛恭敬。</div>
        <div class="sentence">例句：他雖然取得很大成就，但依然保持謙遜的態度。</div>
    </div>

    <div class="word-card">
        <div class="word">4. 鍥而不捨</div>
        <div class="pinyin">qiè ér bù shě</div>
        <div class="meaning">比喻堅持不懈。</div>
        <div class="sentence">例句：只要有鍥而不捨的精神，任何困難都能克服。</div>
    </div>

    <div class="word-card">
        <div class="word">5. 瑰寶</div>
        <div class="pinyin">guī bǎo</div>
        <div class="meaning">特別珍貴的東西。</div>
        <div class="sentence">例句：故宮博物院收藏了許多中華民族的藝術瑰寶。</div>
    </div>
</body>
</html>
