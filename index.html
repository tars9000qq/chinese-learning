<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TARS 每日中文五詞訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .slide-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .progress-transition { transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="app"></div>

<script>
    const WORDS = [
        { id: 1, word: '興高采烈', pinyin: 'xìng gāo cǎi liè', jyutping: 'hing3 gou1 coi2 lit6', meaning: '形容興致高昂，情緒熱烈。', example: '聽說明天要去大東山遠足，全班同學都興高采烈地討論著。', level: '小四至小五' },
        { id: 2, word: '垂頭喪氣', pinyin: 'chuí tóu sàng qì', jyutping: 'seoi4 tau4 song3 hei3', meaning: '低著頭，精神不振。形容失望或失敗後的樣子。', example: '球賽輸了之後，球員們都垂頭喪氣地走回更衣室。', level: '小四至小五' },
        { id: 3, word: '猶豫', pinyin: 'yóu yù', jyutping: 'jau4 jyu6', meaning: '拿不定主意，遲疑。', example: '面對這個艱難的選擇，他猶豫了很久才下定決心。', level: '小四至小五' },
        { id: 4, word: '徘徊', pinyin: 'pái huái', jyutping: 'pui4 wui4', meaning: '在一個地方走來走去；比喻事物在某個範圍內起伏或猶豫不決。', example: '他一個人在公園門口徘徊，似乎在等什麼人。', level: '小四至小五' },
        { id: 5, word: '觀察', pinyin: 'guān chá', jyutping: 'gun1 caat3', meaning: '仔細察看事物或現象。', example: '我們要學習透過觀察身邊的細節，來豐富寫作的內容。', level: '小四至小五' }
    ];

    const QUIZ = [
        { id: 1, question: '小明因為考試不合格，整天都（ ），提不起勁。', options: ['興高采烈', '垂頭喪氣', '徘徊'], answer: 1, relatedWord: '垂頭喪氣' },
        { id: 2, question: '對於是否要參加這次比賽，他表現得非常（ ），一直拿不定主意。', options: ['猶豫', '觀察', '興高采烈'], answer: 0, relatedWord: '猶豫' },
        { id: 3, question: '科學家透過長期的（ ），終於發現了這種動植物的習性。', options: ['徘徊', '猶豫', '觀察'], answer: 2, relatedWord: '觀察' },
        { id: 4, question: '收到生日禮物後，妹妹（ ）地跳了起來。', options: ['垂頭喪氣', '徘徊', '興高采烈'], answer: 2, relatedWord: '興高采烈' },
        { id: 5, question: '他在街口不停地（ ），看起來像是迷路了。', options: ['觀察', '徘徊', '猶豫'], answer: 1, relatedWord: '徘徊' }
    ];

    let state = {
        phase: 'splash',
        currentWord: 0,
        currentQuiz: 0,
        quizAnswers: [],
        selectedOption: null,
        showResult: false,
        startTime: new Date(),
        endTime: null
    };

    function updateState(newState) {
        state = { ...state, ...newState };
        render();
    }

    function handleSpeak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-HK';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function handleSendReport() {
        const today = new Date();
        const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const dayOfWeek = `星期${dayNames[today.getDay()]}`;
        const correctCount = state.quizAnswers.filter(a => a.correct).length;
        const score = Math.round((correctCount / QUIZ.length) * 100);
        const incorrectWords = state.quizAnswers.filter(a => !a.correct).map(a => a.relatedWord);
        const finishTime = state.endTime ? `${String(state.endTime.getHours()).padStart(2, '0')}:${String(state.endTime.getMinutes()).padStart(2, '0')}` : '';

        const reportText = `📊 每日中文訓練完成報告\n日期：${dateStr} ${dayOfWeek}\n完成時間：${finishTime} HKT\n正確率：${score}% (${correctCount}/${QUIZ.length})\n已學詞彙：${WORDS.map(w => w.word).join('、')}${incorrectWords.length > 0 ? '\n需複習：' + incorrectWords.join('、') : '\n🌟 全部掌握！'}`;

        if (navigator.share) {
            navigator.share({ text: reportText }).catch(() => {
                copyToClipboard(reportText);
            });
        } else {
            copyToClipboard(reportText);
        }
    }

    function copyToClipboard(text) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert('報告內容已複製到剪貼簿，請貼上並發送給家長！');
    }

    function render() {
        const app = document.getElementById('app');
        const today = new Date();
        const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const dayOfWeek = `星期${dayNames[today.getDay()]}`;

        if (state.phase === 'splash') {
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center p-4">
                    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center slide-enter">
                        <div class="text-6xl mb-4">📚</div>
                        <h1 class="text-2xl font-bold text-gray-800 mb-2">每日中文五詞訓練</h1>
                        <p class="text-sm text-gray-500 mb-1">${dateStr} ${dayOfWeek}</p>
                        <p class="text-xs text-purple-500 font-medium mb-6">銜接小四至小五 · 基礎情感與動作</p>
                        <div class="bg-purple-50 rounded-xl p-4 mb-6 text-left text-sm text-gray-600 space-y-1">
                            <p class="text-purple-700 font-medium mb-1">📋 今日任務</p>
                            <p>✦ 學習 5 個核心中文詞彙</p>
                            <p>✦ 掌握詞義、讀音和例句</p>
                            <p>✦ 完成 5 題選擇測驗</p>
                        </div>
                        <button onclick="updateState({phase: 'learning'})" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg active:scale-95 transition-transform">
                            開始學習 🚀
                        </button>
                    </div>
                </div>
            `;
        } else if (state.phase === 'learning') {
            const word = WORDS[state.currentWord];
            const progress = ((state.currentWord + 1) / WORDS.length) * 100;
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex flex-col p-4">
                    <div class="max-w-sm w-full mx-auto mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-medium text-indigo-600 font-bold uppercase">📖 學習階段</span>
                            <span class="text-xs text-gray-500 font-bold">${state.currentWord + 1} / ${WORDS.length}</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                            <div class="bg-indigo-500 h-full progress-transition" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="flex-1 flex items-center justify-center">
                        <div class="bg-white rounded-3xl shadow-xl p-6 max-w-sm w-full slide-enter">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-medium">${word.level}</span>
                                <button onclick="handleSpeak('${word.word}')" class="flex items-center gap-1 bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-medium active:scale-95 transition-transform">
                                    <i class="fas fa-volume-up"></i> 發音
                                </button>
                            </div>
                            <h2 class="text-5xl font-bold text-center text-gray-800 my-6 tracking-widest">${word.word}</h2>
                            <div class="text-center mb-5 text-gray-400 text-sm">
                                <p>普通話: ${word.pinyin}</p>
                                <p>粵語: ${word.jyutping}</p>
                            </div>
                            <div class="bg-blue-50 rounded-2xl p-4 mb-4 text-left">
                                <p class="text-xs font-bold text-blue-600 mb-1 uppercase tracking-wider">📖 詞義</p>
                                <p class="text-sm text-gray-700 leading-relaxed">${word.meaning}</p>
                            </div>
                            <div class="bg-green-50 rounded-2xl p-4 text-left">
                                <p class="text-xs font-bold text-green-600 mb-1 uppercase tracking-wider">📝 例句</p>
                                <p class="text-sm text-gray-700 leading-relaxed italic">${word.example}</p>
                            </div>
                        </div>
                    </div>
                    <div class="max-w-sm w-full mx-auto mt-4 flex gap-3 pb-4">
                        <button onclick="updateState({currentWord: state.currentWord - 1})" ${state.currentWord === 0 ? 'disabled class="flex-1 py-4 rounded-2xl font-bold bg-gray-200 text-gray-400"' : 'class="flex-1 py-4 rounded-2xl font-bold bg-white text-indigo-600 shadow-md active:scale-95"'}>
                            <i class="fas fa-chevron-left mr-1"></i> 上一個
                        </button>
                        <button onclick="${state.currentWord < WORDS.length - 1 ? `updateState({currentWord: state.currentWord + 1})` : `updateState({phase: 'quiz-intro'})`}" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
                            ${state.currentWord < WORDS.length - 1 ? '下一個 <i class="fas fa-chevron-right ml-1"></i>' : '開始測驗 📝'}
                        </button>
                    </div>
                </div>
            `;
        } else if (state.phase === 'quiz-intro') {
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-amber-50 to-orange-100 flex items-center justify-center p-4 text-center">
                    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full slide-enter">
                        <div class="text-6xl mb-4">📝</div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">詞彙學習完成！</h2>
                        <p class="text-sm text-gray-500 mb-6">現在來測試一下你記住了多少吧？</p>
                        <div class="bg-orange-50 rounded-xl p-4 mb-6 text-left text-sm text-gray-600 space-y-1">
                            <p class="text-orange-700 font-medium mb-1 uppercase tracking-wider">📋 測驗規則</p>
                            <p>✦ 共 5 題選擇題</p>
                            <p>✦ 選出最適合句子的詞語</p>
                            <p>✦ 答錯會顯示正確答案</p>
                        </div>
                        <button onclick="updateState({phase: 'quiz', currentQuiz: 0, quizAnswers: [], selectedOption: null, showResult: false})" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-4 rounded-2xl text-lg shadow-lg active:scale-95 transition-transform">
                            開始測驗 💪
                        </button>
                    </div>
                </div>
            `;
        } else if (state.phase === 'quiz') {
            const q = QUIZ[state.currentQuiz];
            const progress = ((state.currentQuiz + 1) / QUIZ.length) * 100;
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-amber-50 to-orange-100 flex flex-col p-4">
                    <div class="max-w-sm w-full mx-auto mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-medium text-orange-600 font-bold uppercase tracking-widest">📝 測驗階段</span>
                            <span class="text-xs text-gray-500 font-bold">${state.currentQuiz + 1} / ${QUIZ.length}</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-orange-500 h-full progress-transition" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="flex-1 flex items-center justify-center">
                        <div class="bg-white rounded-3xl shadow-xl p-6 max-w-sm w-full slide-enter text-left">
                            <p class="text-xs font-bold text-orange-500 mb-3 uppercase tracking-tighter">Question ${state.currentQuiz + 1}</p>
                            <p class="text-base font-bold text-gray-800 leading-relaxed mb-6">${q.question}</p>
                            <div class="space-y-3">
                                ${q.options.map((opt, i) => {
                                    let cls = "border-slate-100 text-slate-600";
                                    let icon = "";
                                    if (state.showResult) {
                                        if (i === q.answer) {
                                            cls = "bg-green-50 border-green-500 text-green-700";
                                            icon = '<i class="fas fa-check-circle text-green-500"></i>';
                                        } else if (i === state.selectedOption) {
                                            cls = "bg-red-50 border-red-400 text-red-600";
                                            icon = '<i class="fas fa-times-circle text-red-400"></i>';
                                        } else {
                                            cls = "opacity-40 border-slate-100 text-slate-400";
                                        }
                                    }
                                    return `
                                        <button onclick="handleSelectOption(${i})" ${state.showResult ? 'disabled' : ''} class="w-full py-4 px-5 rounded-2xl text-left font-bold text-base flex items-center justify-between border-2 transition-all active:scale-95 ${cls}">
                                            <span>${String.fromCharCode(65+i)}. ${opt}</span>
                                            ${icon}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                            ${state.showResult ? `
                                <div class="mt-5 p-4 rounded-2xl ${state.selectedOption === q.answer ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'} text-sm font-medium">
                                    ${state.selectedOption === q.answer ? '✅ 答對了！做得好！' : `❌ 答錯了。正確答案是「${q.options[q.answer]}」。`}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    ${state.showResult ? `
                        <div class="max-w-sm w-full mx-auto mt-4 pb-4">
                            <button onclick="handleNextQuiz()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                                ${state.currentQuiz < QUIZ.length - 1 ? '下一題 <i class="fas fa-chevron-right ml-1"></i>' : '查看成績 🏆'}
                            </button>
                        </div>
                    ` : '<div class="h-20"></div>'}
                </div>
            `;
        } else if (state.phase === 'report') {
            const correctCount = state.quizAnswers.filter(a => a.correct).length;
            const score = Math.round((correctCount / QUIZ.length) * 100);
            const incorrectWords = state.quizAnswers.filter(a => !a.correct).map(a => a.relatedWord);
            const finishTime = state.endTime ? `${String(state.endTime.getHours()).padStart(2, '0')}:${String(state.endTime.getMinutes()).padStart(2, '0')}` : '';

            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-emerald-50 to-teal-100 flex items-center justify-center p-4">
                    <div class="bg-white rounded-3xl shadow-2xl p-6 max-w-sm w-full slide-enter text-center">
                        <div class="mb-4">
                            <div class="text-6xl mb-2">${score >= 80 ? '🏆' : score >= 60 ? '👍' : '💪'}</div>
                            <h2 class="text-2xl font-bold text-gray-800">今日訓練完成！</h2>
                            <p class="text-sm text-gray-500 mt-1">${dateStr} ${dayOfWeek}</p>
                        </div>
                        <div class="rounded-2xl p-5 mb-4 text-center ${score >= 80 ? 'bg-emerald-50' : score >= 60 ? 'bg-amber-50' : 'bg-red-50'}">
                            <p class="text-5xl font-bold mb-1" style="color: ${score >= 80 ? '#059669' : score >= 60 ? '#d97706' : '#dc2626'}">${score}%</p>
                            <p class="text-sm text-gray-600 font-bold">正確率 (${correctCount}/${QUIZ.length} 題)</p>
                        </div>
                        <div class="bg-blue-50 rounded-2xl p-4 mb-4 text-xs text-left">
                            <p class="font-bold text-blue-600 mb-2 uppercase tracking-widest">📖 今日已學詞彙</p>
                            <div class="flex flex-wrap gap-2">
                                ${WORDS.map(w => {
                                    const isWrong = incorrectWords.includes(w.word);
                                    return `<span class="px-3 py-1 rounded-full font-bold ${isWrong ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}">${isWrong ? '⚠️' : '✅'} ${w.word}</span>`;
                                }).join('')}
                            </div>
                        </div>
                        <div class="bg-gray-50 rounded-2xl p-4 mb-5 border border-dashed border-gray-300 text-[11px] text-gray-500 space-y-1 text-left leading-tight">
                            <p class="font-bold text-gray-400 mb-1 uppercase tracking-widest">📊 家長報告 (可截圖)</p>
                            <p>日期：${dateStr} ${dayOfWeek}</p>
                            <p>完成時間：${finishTime} HKT</p>
                            <p>正確率：${score}% (${correctCount}/${QUIZ.length})</p>
                            <p>已學：${WORDS.map(w => w.word).join('、')}</p>
                            ${incorrectWords.length > 0 ? `<p class="text-amber-600 font-bold">需複習：${incorrectWords.join('、')}</p>` : '<p class="text-emerald-600 font-bold font-bold text-[12px]">🌟 全部掌握，表現優異！</p>'}
                        </div>
                        <div class="flex gap-3">
                            <button onclick="location.reload()" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                <i class="fas fa-undo"></i> 重新練習
                            </button>
                            <button onclick="handleSendReport()" class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
                                <i class="fas fa-paper-plane"></i> 發送報告
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    window.handleSelectOption = function(idx) {
        if (state.showResult) return;
        const isCorrect = idx === QUIZ[state.currentQuiz].answer;
        const newAnswers = [...state.quizAnswers, { questionId: state.currentQuiz, selected: idx, correct: isCorrect, relatedWord: QUIZ[state.currentQuiz].relatedWord }];
        updateState({ selectedOption: idx, showResult: true, quizAnswers: newAnswers });
    }

    window.handleNextQuiz = function() {
        if (state.currentQuiz < QUIZ.length - 1) {
            updateState({ currentQuiz: state.currentQuiz + 1, selectedOption: null, showResult: false });
        } else {
            updateState({ phase: 'report', endTime: new Date() });
        }
    }

    render();
</script>
</body>
</html>
